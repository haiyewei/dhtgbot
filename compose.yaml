# First run:
#   1. docker compose run --rm dhtgbot init
#   2. edit ./.docker-data/config.yaml
#   3. docker compose up -d
services:
  dhtgbot:
    image: ${DHTGBOT_IMAGE:-docker.io/haiyewei/dhtgbot:latest}
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DHTGBOT_HOME: /var/lib/dhtgbot
      RUST_LOG: ${RUST_LOG:-info}
    volumes:
      - ./.docker-data:/var/lib/dhtgbot
    ports:
      - "4567:4567"
      - "8787:8787"
      - "6800:6800"
