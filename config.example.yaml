bots:
  master:
    name: "master"
    token: "REPLACE_WITH_MASTER_BOT_TOKEN"
    enabled: true
    admins:
      - 123456789
    backup:
      target_group: "-1001234567890"
      target_topic: 0
      password: "CHANGE_BACKUP_PASSWORD"
      import_password: "CHANGE_IMPORT_PASSWORD"

  tdl:
    name: "tdl"
    token: "REPLACE_WITH_TDL_BOT_TOKEN"
    enabled: false
    forward:
      peer: "-1001234567890"
      thread: 0
      listen_chat: "-1001234567890"
      listen_thread: 0
      # Numeric tdlr account user_id for /v1/forwards.
      account: "YOUR_TDLR_ACCOUNT_ID"

  xdl:
    name: "xdl"
    token: "REPLACE_WITH_XDL_BOT_TOKEN"
    enabled: false
    # Numeric tdlr account user_id for /v1/uploads.
    account: "YOUR_TDLR_ACCOUNT_ID"
    twitter:
      # Forwarded to amagi as X-Amagi-Twitter-Cookie on every request.
      # Use single quotes for cookie strings to avoid YAML parsing issues.
      cookies: 'auth_token=...; ct0=...; twid=u%3D...'
      timeout: 15000
    tweetdl:
      listen_group: "-1001234567890"
      listen_topic: 0
      target_group: "-1001234567890"
      target_topic: 0
      download_dir: "./data/downloads"
    like_dl:
      poll_interval: 30
      username: "your_x_username"
      target_group: "-1001234567890"
      target_topic: 0
      download_dir: "./data/downloads"
    author_track:
      poll_interval: 60
      target_group: "-1001234567890"
      target_topic: 0
      download_dir: "./data/downloads"

services:
  amagi:
    base_url: "http://127.0.0.1:4567"
    start_command: "./bin/amagi serve --host 127.0.0.1 --port 4567"
    startup_timeout_ms: 15000

  tdlr:
    base_url: "http://127.0.0.1:8787"
    # dhtgbot uses the structured HTTP API: /v1/version, /v1/forwards, /v1/uploads.
    start_command: "./bin/tdlr service --http-bind 127.0.0.1:8787"
    startup_timeout_ms: 15000

  aria2:
    rpc_url: "http://127.0.0.1:6800/jsonrpc"
    secret:
    start_command: "./bin/aria2c --enable-rpc=true --rpc-listen-all=false --rpc-listen-port=6800"
    startup_timeout_ms: 15000

database:
  type: "sqlite"
  path: "./data/bot.sqlite"
