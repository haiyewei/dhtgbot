name: Docker Publish

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to package into the Docker image
        required: true
        type: string
      publish_latest:
        description: Also publish the latest tag
        required: true
        default: true
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ inputs.release_tag || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ inputs.release_tag }}

      - name: Prepare image name
        id: prep
        shell: bash
        run: |
          repo_name="${GITHUB_REPOSITORY##*/}"
          version="${{ inputs.release_tag }}"
          version="${version#v}"
          minor="$(printf '%s\n' "${version}" | awk -F. '{print $1 "." $2}')"
          echo "dockerhub_image=docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${repo_name,,}" >> "$GITHUB_OUTPUT"
          echo "ghcr_image=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
          echo "release_version=${version}" >> "$GITHUB_OUTPUT"
          echo "release_minor=${minor}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ steps.prep.outputs.dockerhub_image }}
            ${{ steps.prep.outputs.ghcr_image }}
          tags: |
            type=raw,value=latest,enable=${{ inputs.publish_latest }}
            type=raw,value=${{ inputs.release_tag }}
            type=raw,value=${{ steps.prep.outputs.release_version }}
            type=raw,value=${{ steps.prep.outputs.release_minor }}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            DHTGBOT_REPO_OWNER=${{ github.repository_owner }}
            DHTGBOT_REPO_NAME=${{ github.event.repository.name }}
            DHTGBOT_VERSION=${{ inputs.release_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
